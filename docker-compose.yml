services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U demo
      interval: 1s

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
      - ./tests:/code/tests
      - ./scripts:/code/scripts
    command: >
      sh -c "python manage.py migrate &&
             uvicorn app.asgi:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: curl -fsS http://localhost:8000/openapi.json
      interval: 2s
      retries: 30
      start_period: 5s

volumes:
  pgdata:
